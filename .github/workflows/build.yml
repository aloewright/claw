name: Build

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
